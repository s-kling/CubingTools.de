<!DOCTYPE html>
<html lang="en">
<head>
    <script>(function(){try{var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})()</script>
    <!-- Basic Metadata -->
    <title>CT.de • Admin Console</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CubingTools.de Admin Console - Manage server status, users, and system analytics.">
    <meta name="keywords" content="WCA, cubing, admin, console, dashboard, server management">
  
    <!-- Other Fancy Things -->
    <link rel="icon" href="../../assets/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="../../assets/logo_no_text.png">

    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/admin/admin.css">
    <link rel="stylesheet" href="../../css/admin/admin.css">

    <!-- JS Files -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7FDCB5928P" defer></script>
    <script src="../../js/setupPage.js" defer></script>
    <script src="../../js/admin/admin-nav.js" defer></script>
    <script src="../../js/admin/admin.js" defer></script>
</head>

<body>
    <div class="container">
        <nav id="navbar"></nav>

        <div id="sidebar">
            <h2>Tools</h2>
        </div>

        <div id="version"></div>

        <main>
            <section class="heading">
                <h1>Admin Console</h1>
                <p>
                    Access server status, developer tools, and system analytics.
                </p>

                <div id="admin-auth">
                    <label>
                        Username:
                        <input type="text" id="admin-username" placeholder="Username" autocomplete="username" />
                    </label>
                    <label>
                        Password:
                        <input type="password" id="admin-password" placeholder="Password" autocomplete="current-password" />
                    </label>
                    <p id="admin-error" style="color: red; display: none;"></p>
                </div>

                <div id="admin-change-password" style="display: none;">
                    <h2>Change Password</h2>
                    <p>You must set a new password before continuing.</p>
                    <label>
                        New Password:
                        <input type="password" id="admin-new-password" placeholder="New password (min. 8 characters)" autocomplete="new-password" />
                    </label>
                    <label>
                        Confirm Password:
                        <input type="password" id="admin-confirm-password" placeholder="Confirm new password" autocomplete="new-password" />
                    </label>
                    <button id="admin-change-password-btn" type="button">Change Password</button>
                    <p id="admin-change-error" style="color: red; display: none;"></p>
                </div>

                <div id="dashboard" style="display: none;"></div>
            </section>
        </main>
        <footer id="footer"></footer>
    </div>
</body>

</html>
