<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Maintenance – CubingTools.de</title>
  <link rel="stylesheet" href="maintenance.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="card">

        <div class="card-header">
            <img src="https://cubingtools.de/assets/logo_long.png" alt="CubingTools.de">
        </div>

        <div class="card-body">
            <p class="eyebrow">Server Maintenance</p>
            <h1>We'll be back soon!</h1>
            <p>CubingTools is currently undergoing scheduled server maintenance. We're working hard to get things back up and running — thanks so much for your patience!</p>
        </div>

        <div class="card-footer">
            <p>
            &copy; <script>document.write(new Date().getFullYear())</script> CubingTools.de. All rights reserved.
            &bull; <a href="https://cubingtools.de/privacy">Privacy Policy</a>
            &bull; <a href="https://cubingtools.de/terms">Terms of Service</a><br>
            </p>
        </div>

        </div>
    </div>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            font-family: 'Poppins', Arial, sans-serif;
            color: #F4F4F5;
            min-height: 100vh;
            overflow-y: scroll;
        }

        .page-wrapper {
            min-height: 100vh;
            padding: 52px 20px;
            background-image:
                radial-gradient(circle at 92% 6%, rgba(79, 70, 229, 0.22) 0%, transparent 38%),
                radial-gradient(circle at 6% 94%, rgba(63, 167, 214, 0.22) 0%, transparent 38%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
        }

        /* Header */
        .card-header {
            background: linear-gradient(120deg, #4F46E5, #3FA7D6);
            padding: 24px 32px;
        }

        .card-header img {
            height: 52px;
            vertical-align: middle;
        }

        /* Body */
        .card-body {
            background-color: #191923;
            background-image: linear-gradient(170deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 36px 32px;
        }

        .eyebrow {
            font-size: 14px;
            font-weight: 600;
            color: #A1A1AA;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .card-body h1 {
            font-size: 24px;
            font-weight: 700;
            color: #F4F4F5;
            line-height: 1.4;
            margin-bottom: 14px;
        }

        .card-body p {
            font-size: 15px;
            color: #C4C4CF;
            line-height: 1.65;
        }

        /* Footer */
        .card-footer {
            background-color: #191923;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: none;
            border-radius: 0 0 15px 15px;
            padding: 20px 32px;
        }

        .card-footer p {
            font-size: 12px;
            color: #A1A1AA;
            line-height: 1.6;
        }

        .card-footer a {
            color: #3FA7D6;
            text-decoration: none;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }
    </style>
</body>
</html>
